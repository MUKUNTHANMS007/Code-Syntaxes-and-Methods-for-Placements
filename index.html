<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parkinson's Disease Prediction</title>
</head>
<body>
    <h1>Parkinson's Disease Voice Prediction</h1>
    <p>Upload an audio file to predict the likelihood of Parkinson's disease.</p>

    <form action="/predict" method="POST" enctype="multipart/form-data">
        <input type="file" name="file" accept=".wav" required>
        <button type="submit">Upload</button>
    </form>

    <h2 id="result"></h2>

    <script>
        const form = document.querySelector("form");
        form.addEventListener("submit", async (e) => {
            e.preventDefault();

            const formData = new FormData(form);
            const response = await fetch('/predict', {
                method: 'POST',
                body: formData
            });

            const data = await response.json();
            document.getElementById("result").innerText = `Probability of Parkinson's Disease: ${data.probability}`;
        });
    </script>
</body>
</html>
