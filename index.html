<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LeetCode Syntax Reference — C · C++ · Python · Java</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f5f4f0;
  --surface: #ffffff;
  --card: #ffffff;
  --border: #e8e5df;
  --border-strong: #d0ccc4;
  --text: #1a1814;
  --text-muted: #706a60;
  --text-faint: #a09890;
  --code-bg: #1e1c1a;
  --code-text: #e8e0d5;
  --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.05);
  --shadow-hover: 0 4px 12px rgba(0,0,0,0.10), 0 12px 32px rgba(0,0,0,0.08);
  --radius: 14px;
  --radius-sm: 8px;
  --c-lang: #1a1814;
  --c-lang-bg: #1a1814;
  --c-lang-light: #f0ede8;

  --c-color: #00599C;
  --cpp-color: #00427A;
  --py-color: #3776AB;
  --java-color: #C97A00;

  --beginner: #16a34a;
  --beginner-bg: #f0fdf4;
  --intermediate: #2563eb;
  --intermediate-bg: #eff6ff;
  --advanced: #dc2626;
  --advanced-bg: #fef2f2;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Outfit', sans-serif;
  line-height: 1.6;
  min-height: 100vh;
}

/* ── HEADER ── */
.hero {
  background: var(--code-bg);
  padding: 3rem 2rem 2.5rem;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.hero::before {
  content: '';
  position: absolute; inset: 0;
  background: 
    radial-gradient(ellipse 60% 80% at 20% 50%, rgba(0,89,156,0.18) 0%, transparent 60%),
    radial-gradient(ellipse 50% 60% at 80% 50%, rgba(201,122,0,0.15) 0%, transparent 60%);
  pointer-events: none;
}
.hero-inner { position: relative; z-index: 1; max-width: 800px; margin: 0 auto; }
.hero-tag {
  display: inline-flex; align-items: center; gap: 8px;
  background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
  padding: 5px 14px; border-radius: 20px; font-size: 0.72rem;
  font-weight: 600; letter-spacing: 1.2px; text-transform: uppercase;
  color: rgba(255,255,255,0.6); margin-bottom: 1.2rem;
}
.hero-tag span { width: 6px; height: 6px; border-radius: 50%; background: #4ade80; display: inline-block; }
.hero h1 {
  font-size: clamp(2rem, 5vw, 3.2rem); font-weight: 800;
  color: #ffffff; letter-spacing: -1px; line-height: 1.1;
}
.hero h1 em { font-style: normal; color: #facc15; }
.hero p { color: rgba(255,255,255,0.5); margin-top: 0.75rem; font-size: 1rem; font-weight: 300; }
.lang-pills {
  display: flex; justify-content: center; gap: 10px;
  margin-top: 1.8rem; flex-wrap: wrap;
}
.lang-pill {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 16px; border-radius: 24px;
  border: 1px solid rgba(255,255,255,0.15);
  background: rgba(255,255,255,0.07);
  font-size: 0.82rem; font-weight: 600; color: rgba(255,255,255,0.75);
  font-family: 'JetBrains Mono', monospace;
}
.lang-pill .dot { width: 8px; height: 8px; border-radius: 50%; }
.lang-pill.c .dot { background: #5BB8FF; }
.lang-pill.cpp .dot { background: #7ECFFF; }
.lang-pill.py .dot { background: #FFD43B; }
.lang-pill.java .dot { background: #FFAB40; }

.stats-row {
  display: flex; justify-content: center; gap: 2rem;
  margin-top: 2rem; flex-wrap: wrap;
}
.stat { text-align: center; }
.stat-num { font-size: 1.8rem; font-weight: 800; color: #ffffff; letter-spacing: -0.5px; }
.stat-label { font-size: 0.72rem; font-weight: 500; color: rgba(255,255,255,0.35); letter-spacing: 0.5px; text-transform: uppercase; margin-top: 2px; }

/* ── STICKY TOOLBAR ── */
.toolbar {
  background: var(--surface); border-bottom: 1px solid var(--border);
  padding: 0 2rem; position: sticky; top: 0; z-index: 200;
  box-shadow: 0 2px 12px rgba(0,0,0,0.06);
}
.toolbar-inner {
  max-width: 1280px; margin: 0 auto;
  display: flex; align-items: stretch; gap: 0; flex-wrap: wrap;
}

/* Language tabs */
.lang-tabs { display: flex; gap: 0; }
.lang-tab {
  padding: 0 20px; height: 52px; display: flex; align-items: center; gap: 8px;
  font-size: 0.85rem; font-weight: 600; cursor: pointer;
  border: none; background: none; color: var(--text-muted);
  border-bottom: 2px solid transparent; transition: all 0.2s;
  font-family: 'Outfit', sans-serif;
  position: relative;
}
.lang-tab:hover { color: var(--text); }
.lang-tab.active { color: var(--text); border-bottom-color: var(--active-color, #1a1814); }
.lang-tab .lang-dot { width: 8px; height: 8px; border-radius: 50%; }
.lang-tab[data-lang="all"] .lang-dot { background: linear-gradient(135deg, #5BB8FF, #FFD43B); }
.lang-tab[data-lang="c"] { --active-color: #00599C; }
.lang-tab[data-lang="c"] .lang-dot { background: #00599C; }
.lang-tab[data-lang="cpp"] { --active-color: #00427A; }
.lang-tab[data-lang="cpp"] .lang-dot { background: #00427A; }
.lang-tab[data-lang="py"] { --active-color: #3776AB; }
.lang-tab[data-lang="py"] .lang-dot { background: #f5c518; }
.lang-tab[data-lang="java"] { --active-color: #C97A00; }
.lang-tab[data-lang="java"] .lang-dot { background: #C97A00; }

.divider-v { width: 1px; background: var(--border); margin: 10px 0; }

/* Level filters */
.level-filters { display: flex; gap: 6px; align-items: center; padding: 0 16px; }
.lvl-btn {
  padding: 5px 14px; border-radius: 20px;
  border: 1px solid var(--border); background: transparent;
  font-size: 0.76rem; font-weight: 600; cursor: pointer;
  color: var(--text-muted); transition: all 0.18s;
  font-family: 'Outfit', sans-serif; letter-spacing: 0.2px;
}
.lvl-btn:hover { border-color: var(--border-strong); color: var(--text); }
.lvl-btn.active.all { background: var(--text); border-color: var(--text); color: #fff; }
.lvl-btn.active.beginner { background: var(--beginner); border-color: var(--beginner); color: #fff; }
.lvl-btn.active.intermediate { background: var(--intermediate); border-color: var(--intermediate); color: #fff; }
.lvl-btn.active.advanced { background: var(--advanced); border-color: var(--advanced); color: #fff; }

/* Search */
.search-area { margin-left: auto; display: flex; align-items: center; padding: 0 0 0 12px; }
.search-wrap {
  display: flex; align-items: center; gap: 8px;
  background: var(--bg); border: 1px solid var(--border);
  border-radius: 24px; padding: 6px 14px;
}
.search-wrap svg { opacity: 0.4; flex-shrink: 0; }
.search-wrap input {
  border: none; background: transparent; outline: none;
  font-family: 'Outfit', sans-serif; font-size: 0.82rem;
  color: var(--text); width: 180px;
}
.search-wrap input::placeholder { color: var(--text-faint); }

/* ── MAIN CONTENT ── */
main { max-width: 1280px; margin: 0 auto; padding: 2rem; }

.results-meta {
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 1.5rem;
}
.results-count { font-size: 0.82rem; color: var(--text-muted); font-weight: 500; }
.active-lang-badge {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 3px 12px; border-radius: 16px;
  font-size: 0.75rem; font-weight: 600;
}

/* Section header */
.section-header {
  display: flex; align-items: center; gap: 12px;
  margin: 2rem 0 1rem;
}
.section-header h2 {
  font-size: 0.72rem; font-weight: 700; letter-spacing: 1.2px;
  text-transform: uppercase; color: var(--text-muted);
}
.section-header::after { content: ''; flex: 1; height: 1px; background: var(--border); }
.section-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.section-dot.beginner { background: var(--beginner); }
.section-dot.intermediate { background: var(--intermediate); }
.section-dot.advanced { background: var(--advanced); }
.section-count {
  font-size: 0.7rem; font-weight: 600; padding: 2px 8px;
  border-radius: 12px; background: var(--bg);
  border: 1px solid var(--border); color: var(--text-faint);
}

/* Grid */
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 14px; }

/* Card */
.card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--radius); overflow: hidden;
  box-shadow: var(--shadow); transition: box-shadow 0.22s, transform 0.22s, border-color 0.22s;
  animation: fadeUp 0.35s ease both;
}
.card:hover {
  box-shadow: var(--shadow-hover); transform: translateY(-2px);
  border-color: var(--border-strong);
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(14px); }
  to { opacity: 1; transform: translateY(0); }
}

.card-top {
  padding: 14px 16px 10px;
  display: flex; align-items: flex-start; justify-content: space-between; gap: 10px;
}
.card-meta { flex: 1; min-width: 0; }
.card-name { font-size: 0.92rem; font-weight: 700; color: var(--text); }
.card-where { font-size: 0.74rem; color: var(--text-muted); margin-top: 2px; font-weight: 400; }
.card-badges { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0; }

.level-badge {
  font-size: 0.65rem; font-weight: 700; letter-spacing: 0.4px;
  padding: 3px 9px; border-radius: 10px; text-transform: uppercase;
}
.level-badge.beginner { background: var(--beginner-bg); color: var(--beginner); }
.level-badge.intermediate { background: var(--intermediate-bg); color: var(--intermediate); }
.level-badge.advanced { background: var(--advanced-bg); color: var(--advanced); }

.lang-badge {
  font-size: 0.62rem; font-weight: 700; letter-spacing: 0.3px;
  padding: 2px 8px; border-radius: 8px; font-family: 'JetBrains Mono', monospace;
}
.lang-badge.c { background: #e8f2fc; color: #00599C; }
.lang-badge.cpp { background: #e6f0f8; color: #00427A; }
.lang-badge.py { background: #fffbeb; color: #92650a; }
.lang-badge.java { background: #fff7ed; color: #C97A00; }

.card-divider { height: 1px; background: var(--border); margin: 0 16px; }

.code-section { padding: 10px 16px 14px; }
.code-label {
  font-size: 0.64rem; font-weight: 700; letter-spacing: 1px;
  text-transform: uppercase; color: var(--text-faint); margin-bottom: 6px;
}
pre {
  background: var(--code-bg); border-radius: var(--radius-sm);
  padding: 11px 13px; overflow-x: auto;
  font-family: 'JetBrains Mono', monospace; font-size: 0.73rem;
  line-height: 1.65; color: var(--code-text);
}

/* Syntax highlighting */
.kw { color: #c792ea; }
.ty { color: #80cbc4; }
.st { color: #c3e88d; }
.cm { color: #546e7a; font-style: italic; }
.nm { color: #f78c6c; }
.fn { color: #82aaff; }
.op { color: #89ddff; }
.pp { color: #ffcb6b; }

/* No results */
.no-results {
  grid-column: 1/-1; text-align: center; padding: 4rem 2rem;
  color: var(--text-muted);
}
.no-results h3 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.5rem; }

/* Footer */
footer {
  background: var(--code-bg); color: rgba(255,255,255,0.35);
  text-align: center; padding: 2rem; font-size: 0.8rem; font-weight: 400;
  margin-top: 4rem;
}
footer strong { color: rgba(255,255,255,0.7); }

/* Responsive */
@media (max-width: 700px) {
  .toolbar-inner { flex-direction: column; }
  .lang-tabs { overflow-x: auto; }
  .search-area { padding: 8px 0; width: 100%; }
  .search-wrap { width: 100%; }
  .search-wrap input { width: 100%; }
  .grid { grid-template-columns: 1fr; }
  .stats-row { gap: 1.2rem; }
  .level-filters { flex-wrap: wrap; }
}

.hidden { display: none !important; }
</style>
</head>
<body>

<!-- HERO -->
<header class="hero">
  <div class="hero-inner">
    <div class="hero-tag"><span></span> Open Source Reference</div>
    <h1>LeetCode Syntax <em>Cheatsheet</em></h1>
    <p>Everything you need — from Hello World to Dynamic Programming</p>
    <div class="lang-pills">
      <div class="lang-pill c"><div class="dot"></div>C Language</div>
      <div class="lang-pill cpp"><div class="dot"></div>C++</div>
      <div class="lang-pill py"><div class="dot"></div>Python 3</div>
      <div class="lang-pill java"><div class="dot"></div>Java</div>
    </div>
    <div class="stats-row">
      <div class="stat"><div class="stat-num" id="total-count">80+</div><div class="stat-label">Syntaxes</div></div>

<!-- TOOLBAR -->
<div class="toolbar">

      <button class="lang-tab" data-lang="py" onclick="setLang('py',this)"><div class="lang-dot"></div>Python</button>
      <button class="lang-tab" data-lang="java" onclick="setLang('java',this)"><div class="lang-dot"></div>Java</button>
    </div>
    <div class="divider-v"></div>
    <div class="level-filters">
      <button class="lvl-btn active all" onclick="setLevel('all',this)">All Levels</button>
      <button class="lvl-btn" onclick="setLevel('beginner',this)">Beginner</button>
      <button class="lvl-btn" onclick="setLevel('intermediate',this)">Intermediate</button>
      <button class="lvl-btn" onclick="setLevel('advanced',this)">Advanced</button>
    </div>
    <div class="search-area">

        <input type="text" id="searchInput" placeholder="Search syntax..." oninput="doSearch()" />
      </div>
    </div>
  </div>
</div>

<!-- MAIN -->
<main>
  <div class="results-meta">
    <span class="results-count" id="resultsCount">Showing all syntaxes</span>
  </div>
  <div id="content"></div>
</main>

<footer>
  <strong>LeetCode Syntax Reference</strong> · C · C++ · Python · Java · Built for competitive programmers
</footer>

// ── State ──
let activeLang = 'all', activeLevel = 'all', searchQ = '';

function setLang(lang, btn) {
  activeLang = lang;
  document.querySelectorAll('.lang-tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render();
}
function setLevel(lv, btn) {
  activeLevel = lv;
  document.querySelectorAll('.lvl-btn').forEach(b=>b.classList.remove('active','all','beginner','intermediate','advanced'));
  btn.classList.add('active', lv);
  render();
}
function doSearch() {
  searchQ = document.getElementById('searchInput').value.toLowerCase().trim();
  render();
}

const levelOrder = ['beginner','intermediate','advanced'];
const levelLabel = { beginner:'Beginner', intermediate:'Intermediate', advanced:'Advanced' };
const langLabel = { c:'C', cpp:'C++', py:'Python', java:'Java' };

function render() {
  const container = document.getElementById('content');
  const filtered = DB.filter(d =>
    (activeLang==='all'||d.lang===activeLang) &&
    (activeLevel==='all'||d.level===activeLevel) &&
    (!searchQ || d.name.toLowerCase().includes(searchQ) || d.where.toLowerCase().includes(searchQ))
  );

  document.getElementById('resultsCount').textContent =
    `Showing ${filtered.length} of ${DB.length} syntaxes`;
  document.getElementById('total-count').textContent = DB.length + '+';

  if (!filtered.length) {
    container.innerHTML = `<div class="grid"><div class="no-results"><h3>No results found</h3><p>Try a different search or filter combination</p></div></div>`;
    return;
  }

  // Group by level, then optionally by lang
  let html = '';
  levelOrder.forEach(lv => {
    const inLevel = filtered.filter(d=>d.level===lv);
    if (!inLevel.length) return;

    html += `<div class="section-header">
      <div class="section-dot ${lv}"></div>
      <h2>${levelLabel[lv]}</h2>
      <span class="section-count">${inLevel.length} syntaxes</span>
    </div>
    <div class="grid">`;

    inLevel.forEach((d, i) => {
      const delay = (i % 8) * 0.04;
      html += `
      <div class="card" style="animation-delay:${delay}s">
        <div class="card-top">
          <div class="card-meta">
            <div class="card-name">${d.name}</div>
            <div class="card-where">${d.where}</div>
          </div>
          <div class="card-badges">
            <span class="level-badge ${d.level}">${levelLabel[d.level]}</span>
            <span class="lang-badge ${d.lang}">${langLabel[d.lang]}</span>
          </div>
        </div>
        <div class="card-divider"></div>
        <div class="code-section">
          <div class="code-label">Syntax</div>
          <pre>${d.syntax}</pre>
        </div>
        <div class="code-section" style="padding-top:0">
          <div class="code-label">Example</div>
          <pre>${d.example}</pre>
        </div>
      </div>`;
    });
    html += '</div>';
  });

  container.innerHTML = html;
}

render();
</script>
